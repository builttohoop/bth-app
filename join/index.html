<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23111318'/%3E%3Crect y='57' width='64' height='7' fill='%23c49e54'/%3E%3C/svg%3E">
  <title>Open Built to Hoop</title>
  <style>
    :root{--ink:#111318;--cream:#f3efe7;--gold:#c49e54;--muted:#696761;--line:#d7d0c4}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--cream);color:var(--ink);font-family:Arial,sans-serif;display:grid;place-items:center;padding:24px}
    main{width:min(100%,520px)}
    .mark{display:inline-block;background:var(--ink);color:var(--cream);font-size:22px;font-weight:900;letter-spacing:2px;padding:14px 16px;border-bottom:5px solid var(--gold)}
    h1{margin:30px 0 10px;font-size:42px;line-height:1;letter-spacing:0;text-transform:uppercase}
    p{color:var(--muted);font-size:17px;line-height:1.55}
    .actions{display:grid;gap:10px;margin-top:28px}
    a{display:block;border:1px solid var(--ink);padding:15px 18px;text-align:center;color:var(--ink);font-size:14px;font-weight:800;text-decoration:none;text-transform:uppercase}
    a.primary{background:var(--gold)}
    .code{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-transform:uppercase}
  </style>
</head>
<body>
  <main>
    <div class="mark">BTH</div>
    <h1>Stay ready.</h1>
    <p>Open Built to Hoop to train with this invite. If the app is not installed yet, continue to the web home.</p>
    <div class="actions">
      <a class="primary" id="open-app" href="bthapp://join">Open Built to Hoop</a>
      <a id="web-home" href="/">Continue on web</a>
    </div>
    <div class="code" id="invite-code"></div>
  </main>
  <script>
    (function () {
      var raw = new URLSearchParams(location.search).get("ref") || "";
      var ref = raw.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 16);
      var suffix = ref ? "?ref=" + encodeURIComponent(ref) : "";
      var appUrl = "bthapp://join" + suffix;
      document.getElementById("open-app").href = appUrl;
      document.getElementById("web-home").href = "/" + suffix;
      document.getElementById("invite-code").textContent = ref ? "Invite code: " + ref : "";
      if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        setTimeout(function () { location.href = appUrl; }, 250);
      }
    })();
  </script>
</body>
</html>
