  <style>
    :root {
      --black:#111318; --gold:#E6A800; --gold-dim:#B88A00; --gold-bg:#FFF8E1;
      --white:#F3EFE7; --dark:#FFFFFF; --mid:#F5F1EA; --gray:#E0DAD0; --muted:#9E9690;
      --red:#C94B4B; --green:#2F9B56; --blue:#2A7DB5;
      --nav-h:68px; --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,44px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--white);color:var(--black);font-family:'DM Sans',sans-serif;}
    @keyframes tabIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
    @keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.35)}70%{transform:scale(.9)}100%{transform:scale(1)}}
    @keyframes pipPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    @keyframes goldGlow{0%,100%{box-shadow:0 0 8px rgba(230,168,0,.25)}50%{box-shadow:0 0 22px rgba(230,168,0,.55)}}
    nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sb));padding-bottom:var(--sb);background:var(--dark);border-top:1px solid var(--gray);box-shadow:0 -2px 12px rgba(17,19,24,.07);display:flex;align-items:center;z-index:100;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--muted);transition:color .2s;}
    .nav-btn.active{color:var(--gold);}
    .nav-icon{font-size:20px;transition:transform .2s;}
    .nav-btn.active .nav-icon{transform:scale(1.15);animation:breathe 3.5s ease-in-out infinite;}
    .nav-label{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
    .tab{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--sb));overflow-y:auto;overflow-x:hidden;padding:calc(var(--st) + 16px) 16px 24px;display:none;-webkit-overflow-scrolling:touch;}
    .tab.active{display:block;animation:tabIn .3s ease;}
    .page-title{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--black);}
    .page-sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);margin-top:3px;}
    .page-head{margin-bottom:18px;}
    .section-label{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .card{background:var(--dark);border:1px solid var(--gray);border-radius:12px;padding:16px;margin-bottom:12px;animation:cardIn .3s ease both;box-shadow:0 1px 5px rgba(17,19,24,.06);}
    .card-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--gold);margin-bottom:10px;letter-spacing:.6px;text-transform:uppercase;}
    .input-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray);}
    .input-row:last-child{border-bottom:none;}
    .input-label{font-size:14px;font-weight:500;color:var(--black);}
    .input-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);}
    .num-input{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--gold);background:none;border:none;outline:none;width:70px;text-align:right;-webkit-appearance:none;}
    .num-input::placeholder{color:var(--muted);font-size:14px;}
    .bar-wrap{height:4px;background:var(--gray);border-radius:2px;overflow:hidden;margin-top:6px;}
    .bar-fill{height:100%;border-radius:2px;transition:width .4s ease,background .3s ease;}
    .bar-gold{background:var(--gold);}.bar-green{background:var(--green);}.bar-blue{background:var(--blue);}.bar-red{background:var(--red);}
    .btch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btch-item{display:flex;align-items:center;gap:8px;background:var(--mid);border:1px solid var(--gray);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .2s,background .2s;}
    .btch-item.done{border-color:var(--gold);background:var(--gold-bg);}
    .btch-icon{font-size:16px;flex-shrink:0;}.btch-label{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--black);}
    .btch-check{margin-left:auto;font-size:14px;color:var(--muted);}
    .btch-item.done .btch-check{color:var(--gold);animation:checkPop .3s ease;}
    .btch-all-done{background:var(--gold-bg);border:1px solid var(--gold);border-radius:10px;padding:12px 16px;margin-bottom:10px;text-align:center;font-weight:900;font-size:14px;letter-spacing:1px;color:var(--gold);animation:goldGlow 2s ease-in-out infinite;display:none;}
    .task-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray);}
    .task-item:last-child{border-bottom:none;}
    .task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color .2s,background .2s;font-size:13px;color:transparent;}
    .task-check.done{border-color:var(--gold);background:var(--gold);color:var(--black);animation:checkPop .3s ease;}
    .task-text{font-size:13px;flex:1;}.task-text.done{text-decoration:line-through;color:var(--muted);}
    .collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;user-select:none;}
    .collapsible-arrow{font-size:12px;color:var(--muted);transition:transform .25s;}
    .collapsible-body{overflow:hidden;transition:max-height .35s ease;max-height:0;}
    .collapsible-body.open{max-height:3000px;}
    .collapsible-header.open .collapsible-arrow{transform:rotate(180deg);}
    .sched-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray);}
    .sched-item:last-child{border-bottom:none;}
    .sched-time{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);min-width:54px;cursor:pointer;border:none;background:none;outline:none;-webkit-appearance:none;}
    .sched-label{font-size:14px;font-weight:500;color:var(--black);flex:1;}
    .pip-row{display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
    .pip-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;border:2px solid var(--gray);color:var(--muted);animation:pipPop .25s ease both;}
    .pip-dot.done{background:var(--gold);border-color:var(--gold);color:var(--black);}
    .pip-dot.today{border-color:var(--gold);color:var(--gold);animation:goldGlow 2s ease-in-out infinite;}
    .pip-dot.rest{background:var(--gray);border-color:var(--gray);color:var(--muted);}
    .streak-stat{text-align:center;flex:1;}
    .streak-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--gold);}
    .streak-label{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px;text-transform:uppercase;}
    .grade-card{text-align:center;padding:24px 16px;}
    .grade-letter{font-family:'Oswald',sans-serif;font-size:80px;font-weight:700;line-height:1;animation:breathe 4s ease-in-out infinite;}
    .grade-score{font-family:'Space Mono',monospace;font-size:14px;color:var(--muted);margin-top:6px;}
    .grade-breakdown{display:flex;margin-top:16px;border-top:1px solid var(--gray);}
    .grade-item{flex:1;text-align:center;padding:10px 4px;border-right:1px solid var(--gray);}
    .grade-item:last-child{border-right:none;}
    .grade-item-val{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--black);}
    .grade-item-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .week-day-selector{display:flex;gap:6px;margin-bottom:14px;}
    .sel-btn{flex:1;padding:8px 4px;text-align:center;border-radius:8px;border:1px solid var(--gray);background:var(--mid);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;}
    .sel-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);}
    .exercise-row{padding:13px 0;border-bottom:1px solid var(--gray);animation:cardIn .2s ease both;}
    .exercise-row:last-child{border-bottom:none;}
    .ex-name{font-size:14px;font-weight:600;color:var(--black);margin-bottom:4px;}
    .ex-week{font-family:'Space Mono',monospace;font-size:13px;color:var(--gold);}
    .ex-rest{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}
    .warmup-item{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--gray);}
    .warmup-item:last-child{border-bottom:none;}
    .intent-badge{display:inline-block;padding:4px 12px;border-radius:20px;background:var(--gold-bg);border:1px solid var(--gold);font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin-bottom:6px;}
    .intent-feel{font-size:12px;color:var(--muted);font-style:italic;}
    .goal-edit-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray);}
    .goal-edit-row:last-child{border-bottom:none;}
    .goal-label{font-size:14px;font-weight:500;color:var(--black);}
    .goal-input{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--gold);background:none;border:none;outline:none;width:70px;text-align:right;-webkit-appearance:none;}
    .week-day-bar{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--gray);}
    .week-day-bar:last-child{border-bottom:none;}
    .wdb-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:28px;}

    .wdb-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:36px;text-align:right;}
    .note-item{background:var(--mid);border:1px solid var(--gray);border-radius:8px;padding:12px;margin-bottom:8px;animation:cardIn .2s ease both;}
    .note-text{font-size:14px;color:var(--black);line-height:1.55;white-space:pre-wrap;}
    .note-ts{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;}
    .note-delete{float:right;font-size:12px;color:var(--muted);cursor:pointer;margin-left:8px;}
    .note-textarea{width:100%;background:var(--mid);border:1px solid var(--gray);border-radius:10px;padding:12px;color:var(--black);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;outline:none;min-height:82px;transition:border-color .2s;display:block;}
    .note-textarea:focus{border-color:var(--gold);}
    .btn-primary{width:100%;padding:14px;background:var(--gold);border:none;border-radius:10px;font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.8px;text-transform:uppercase;color:var(--black);cursor:pointer;transition:transform .1s,opacity .1s;}
    .btn-primary:active{transform:scale(.97);}
    .btn-secondary{width:100%;padding:12px;background:none;border:1px solid var(--gray);border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;letter-spacing:.3px;color:var(--muted);cursor:pointer;transition:border-color .2s,color .2s;margin-top:8px;}
    .btn-secondary:active{border-color:var(--gold);color:var(--gold);}
    .ex-input{flex:1;background:var(--mid);border:1px solid var(--gray);border-radius:6px;padding:8px 10px;color:var(--black);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
    .ex-input:focus{border-color:var(--gold);}.ex-input-sm{width:76px;flex:none;}
    .ex-input-row{display:flex;gap:8px;margin-bottom:6px;}
    .added-ex{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--gray);}
    .added-ex:last-child{border-bottom:none;}
    .added-ex-name{font-size:13px;font-weight:500;color:var(--black);}
    .added-ex-sets{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
    .added-ex-del{font-size:12px;color:var(--muted);cursor:pointer;padding:4px;}
    .toast-el{position:fixed;bottom:calc(var(--nav-h) + var(--sb) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);padding:10px 20px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;}
    .toast-el.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .yesterday-banner{background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
    .yesterday-text{font-size:12px;color:var(--gold);font-weight:700;}
    .yesterday-back{font-size:11px;color:var(--muted);cursor:pointer;}
    #today-micro{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;font-weight:500;}
    .divider{height:1px;background:var(--gray);margin:14px 0;}
    .no-data{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;}
    .no-data-icon{font-size:32px;margin-bottom:8px;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>

function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function tyNow(){var d=new Date();if(d.getHours()<6)d.setDate(d.getDate()-1);return d;}
function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function todayKey(){return dateKey(tyNow());}
function yesterdayKey(){var d=tyNow();d.setDate(d.getDate()-1);return dateKey(d);}
function weekKeys(){var d=tyNow(),day=d.getDay(),keys=[];for(var i=1;i<=7;i++){var t=new Date(d);t.setDate(d.getDate()-(day===0?7:day)+i);keys.push(dateKey(t));}return keys;}
function formatDayLabel(key){var p=key.split('-').map(Number),dt=new Date(p[0],p[1]-1,p[2]);return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];}
function formatDate(d){var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate();}
function formatNoteTs(ts){try{var d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){return ts;}}

function scoreDay(d){
  if(!d||!Object.keys(d).length)return null;
  var pts=0,goals=getGoals(),sl=parseFloat(d.sleep)||0,en=parseInt(d.energy)||0;
  pts+=Math.min(20,(sl/8)*20);pts+=Math.min(10,(en/7)*10);
  BTH_ITEMS.forEach(function(it){if(d[it.key])pts+=5;});
  if(d.gym)pts+=20;else if(!d.working)pts+=10;
  pts+=Math.min(1,(parseFloat(d.protein)||0)/goals.protein)*15;
  pts+=Math.min(1,(parseFloat(d.water)||0)/goals.water)*5;
  return Math.round(Math.min(100,pts));
}
function scoreToGrade(s){if(s===null)return null;if(s>=93)return'A+';if(s>=90)return'A';if(s>=87)return'A-';if(s>=83)return'B+';if(s>=80)return'B';if(s>=77)return'B-';if(s>=73)return'C+';if(s>=70)return'C';if(s>=67)return'C-';if(s>=60)return'D';return'F';}
function calcStreak(fn){var streak=0,d=tyNow();for(var i=0;i<90;i++){var k=dateKey(d),lg=getLog(k);if(!lg||!Object.keys(lg).length)break;if(!fn(lg))break;streak++;d.setDate(d.getDate()-1);}return streak;}

function readStreak(){return calcStreak(function(l){return!!l.reading;});}

function renderNutrition(){
  var log=getLog(activeLogKey),goals=getGoals();

  var html='<div class="page-head"><div class="page-title">NUTRITION</div><div class="page-sub">Daily targets + macro tracking</div></div>';
  html+='<div class="card"><div class="card-title">TODAY\'S INTAKE</div>';
  macros.forEach(function(m){var val=parseFloat(log[m.key])||0,pct=Math.min(100,(val/m.goal)*100);html+='<div class="input-row"><div><div class="input-label">'+m.icon+' '+m.label+'</div><div class="input-sub">goal: '+m.goal+' '+m.unit+'</div></div><input class="num-input" type="number" min="0" placeholder="—" value="'+esc(log[m.key]||'')+'" oninput="dbNut(\''+m.key+'\',this.value,\''+m.key+'-bar\',\''+m.color+'\','+m.goal+')"></div><div class="bar-wrap"><div class="bar-fill '+(pct>=100?'bar-green':m.color)+'" id="'+m.key+'-bar" style="width:'+pct+'%"></div></div>';});
  html+='</div>';
  html+='<div class="card"><div class="collapsible-header" onclick="toggleCollapsible(this)"><div class="card-title" style="margin:0;">⚙️ SET GOALS</div><div class="collapsible-arrow">▼</div></div><div class="collapsible-body"><div style="padding-top:10px;">';

function saveGoals(){var current=getGoals();save('bth_goals',Object.assign({},current,tempGoals));tempGoals={};toast('Goals saved ✓');renderNutrition();}
function renderWeek(){
  var keys=weekKeys(),logs=keys.map(function(k){return{key:k,log:getLog(k)};});
  var loggedDays=logs.filter(function(d){return Object.keys(d.log).length>0;}).length;
  var html='<div class="page-head"><div class="page-title">WEEK</div><div class="page-sub">Performance + Pipeline + Streaks</div></div>';

  else{var scores=logs.map(function(d){return scoreDay(d.log);}).filter(function(s){return s!==null;});var avg=Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);var grade=scoreToGrade(avg);var col=avg>=80?'var(--green)':avg>=70?'var(--gold)':'var(--red)';var bthDays=logs.filter(function(d){return BTH_ITEMS.every(function(it){return d.log[it.key];});}).length;var gymDays=logs.filter(function(d){return d.log.gym;}).length;var sleepVals=logs.map(function(d){return parseFloat(d.log.sleep);}).filter(function(v){return v>0;});var avgSleep=sleepVals.length?(sleepVals.reduce(function(a,b){return a+b;},0)/sleepVals.length).toFixed(1)+'h':'—';html+='<div class="grade-letter" style="color:'+col+'">'+grade+'</div><div class="grade-score">'+avg+'/100 AVG · '+loggedDays+' days logged</div><div class="grade-breakdown">';[{label:'BTH',val:bthDays+' days'},{label:'GYM',val:gymDays+' days'},{label:'SLEEP',val:avgSleep}].forEach(function(b){html+='<div class="grade-item"><div class="grade-item-val">'+b.val+'</div><div class="grade-item-lbl">'+b.label+'</div></div>';});html+='</div>';}
  html+='</div>';
  html+='<div class="card"><div class="card-title">THIS WEEK — BTH PIPELINE</div><div class="pip-row">';
  keys.forEach(function(k){var lg=getLog(k),isToday=k===todayKey(),hasData=Object.keys(lg).length>0;var allBTH=hasData&&BTH_ITEMS.every(function(it){return lg[it.key];});var cls=isToday&&!hasData?'today':allBTH?'done':!hasData?'rest':'';html+='<div class="pip-dot '+cls+'">'+formatDayLabel(k).charAt(0)+'</div>';});
  html+='</div></div>';
  var bth=bthStreak(),gym=gymStreak(),read=readStreak();
  var bthB=Math.max(bth,load('bth_best_bth')||0),gymB=Math.max(gym,load('bth_best_gym')||0),readB=Math.max(read,load('bth_best_read')||0);
  save('bth_best_bth',bthB);save('bth_best_gym',gymB);save('bth_best_read',readB);
  html+='<div class="card"><div class="card-title">STREAKS</div><div style="display:flex;">';
  [{label:'BTH',val:bth,best:bthB},{label:'Gym',val:gym,best:gymB},{label:'Read',val:read,best:readB}].forEach(function(s){html+='<div class="streak-stat"><div class="streak-num">'+s.val+'</div><div class="streak-label">'+s.label+'</div><div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">best '+s.best+'</div></div>';});
  html+='</div></div>';
  html+='<div class="card"><div class="card-title">DAY BREAKDOWN</div>';
  keys.forEach(function(k){var lg=getLog(k),isToday=k===todayKey(),score=scoreDay(lg);html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray);"><div style="font-family:\'DM Sans\',sans-serif;font-size:12px;font-weight:600;'+(isToday?'color:var(--gold)':'color:var(--muted)')+';width:32px;">'+formatDayLabel(k)+'</div><div style="flex:1;">';if(score!==null){var g=scoreToGrade(score),gc=score>=80?'var(--green)':score>=70?'var(--gold)':'var(--red)';html+='<div style="display:flex;align-items:center;gap:8px;"><span style="font-family:\'Oswald\',sans-serif;font-size:16px;font-weight:600;color:'+gc+';">'+g+'</span><span style="font-family:\'DM Sans\',sans-serif;font-size:12px;color:var(--muted);">'+score+'/100</span>'+(lg.gym?'<span style="font-size:13px;">💪</span>':'')+(BTH_ITEMS.every(function(it){return lg[it.key];})?'<span style="font-size:13px;">⚡</span>':'')+'</div>';}else{html+='<span style="font-family:\'DM Sans\',sans-serif;font-size:12px;color:var(--muted);">No data</span>';}html+='</div></div>';});
  html+='</div>';
  document.getElementById('tab-week').innerHTML=html;
}

function sendDailyReport(){

  var log=getLog(todayKey()),goals=getGoals();
  var bthDone=BTH_ITEMS.filter(function(it){return log[it.key];}).map(function(it){return it.label;}).join(', ')||'None';
  var sc=scoreDay(log),grade=sc!==null?(scoreToGrade(sc)+' ('+sc+'/100)'):'No data yet';
